<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Source Sermon Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen">
    <main class="max-w-5xl mx-auto px-4 py-8">
      <section class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
        <h1 class="text-3xl font-bold tracking-tight mb-2">Open Source Sermon Generator</h1>
        <p class="text-slate-600 mb-6">
          Generate sermon drafts with your local Mistral model served via vLLM.
        </p>

        <div class="grid gap-4 md:grid-cols-2">
          <div class="md:col-span-2">
            <label for="sermonPrompt" class="block text-sm font-semibold mb-2">Sermon Prompt</label>
            <textarea
              id="sermonPrompt"
              rows="4"
              class="w-full rounded-xl border border-slate-300 p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
              placeholder="Example: Encourage believers to trust God in seasons of uncertainty."
            ></textarea>
          </div>

          <div>
            <label for="verseTopic" class="block text-sm font-semibold mb-2">Bible Verse / Topic</label>
            <input
              id="verseTopic"
              type="text"
              class="w-full rounded-xl border border-slate-300 p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
              placeholder="Romans 8:28, faith in trials..."
            />
          </div>

          <div>
            <label for="length" class="block text-sm font-semibold mb-2">Sermon Length</label>
            <select
              id="length"
              class="w-full rounded-xl border border-slate-300 p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
            >
              <option value="Short">Short</option>
              <option value="Medium" selected>Medium</option>
              <option value="Long">Long</option>
            </select>
          </div>

          <div>
            <label for="maxTokens" class="block text-sm font-semibold mb-2">
              Max Tokens: <span id="maxTokensValue" class="text-indigo-600 font-bold">1000</span>
            </label>
            <input id="maxTokens" type="range" min="500" max="2000" step="50" value="1000" class="w-full" />
          </div>

          <div>
            <label for="temperature" class="block text-sm font-semibold mb-2">
              Temperature: <span id="temperatureValue" class="text-indigo-600 font-bold">0.7</span>
            </label>
            <input id="temperature" type="range" min="0.1" max="1.0" step="0.1" value="0.7" class="w-full" />
          </div>

          <div class="md:col-span-2">
            <label for="fullPrompt" class="block text-sm font-semibold mb-2">Editable Full Prompt</label>
            <textarea
              id="fullPrompt"
              rows="8"
              class="w-full rounded-xl border border-slate-300 p-3 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            ></textarea>
          </div>
        </div>

        <div class="mt-4 flex flex-wrap items-center gap-4">
          <label class="inline-flex items-center gap-2 text-sm font-medium">
            <input id="htmlMode" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-indigo-600" />
            HTML Output Mode
          </label>
          <button
            id="rebuildPrompt"
            class="px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50 transition"
          >
            Rebuild Prompt
          </button>
          <button
            id="generateBtn"
            class="px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition"
          >
            Generate Sermon
          </button>
        </div>

        <div id="loading" class="hidden mt-6 flex items-center gap-3 text-indigo-700">
          <div class="spinner"></div>
          <span class="text-sm font-medium">Generating sermon...</span>
        </div>

        <div id="errorBox" class="hidden mt-6 rounded-xl bg-red-50 border border-red-200 p-4 text-red-700 text-sm"></div>

        <section class="mt-6">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-xl font-semibold">Generated Sermon</h2>
            <button
              id="copyBtn"
              class="px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50 transition"
              disabled
            >
              Copy
            </button>
          </div>
          <article
            id="output"
            class="output-box bg-slate-50 border border-slate-200 rounded-xl p-4 min-h-[220px] whitespace-pre-wrap"
          >
            Your generated sermon will appear here.
          </article>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
